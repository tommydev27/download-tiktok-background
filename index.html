<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tommy Video & MP3 Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <style>
 
        body { background: rgb(242, 242, 242); color: #475569; font-family: sans-serif; margin:0; padding: 0; width: 100%; }
        
        .container { padding: 2px;  }
        
        .card { text-align: center; border-radius: 20px;
          background: rgb(242, 242, 242); box-shadow: 2px 2px 5px #4b60523d, -8px -8px 6px #dddddd87; padding: 10px;
        }
        
        .footer-wrapper {
            display: flex;
            background: rgb(242, 242, 242);
            box-shadow: 2px 2px 5px #4b60523d, -8px -8px 6px #dddddd87;
            padding: 2vw;
            border-radius: 3vw;
            align-items: stretch;
            box-sizing: border-box;
            width: 100%;
        }

        .thumb-column {
            width: 50%; 
        }

        .thumb-container {
            width: 110%; 
            background: rgb(242, 242, 242);
            border-radius: 2vw;
            overflow: hidden;
            display: block;
        }

        .thumbnail { 
            width: 100%; 
            height: auto; 
            object-fit: cover; 
            display: block; 
        }

        .result-column {
            width: 50%; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 7vw;
            box-sizing: border-box;
            text-align: left;
            position: relative;
        }

        .video-title-box {
            font-size: 3vw;
            color: #475569;
            font-weight: bold;
            line-height: 1.3;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .spinner {
            display: none;
            width: 6vw;
            height: 6vw;
            border: 1vw solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #475569;
            animation: spin 1s linear infinite;
            margin-top: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        input { width: 100%; padding: 10px; border-radius: 50px;
        border: 0.2vw solid #00ce00;  background: rgb(242, 242, 242);  margin-top: 15px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size:12px;
        box-shadow: 2px 2px 5px #4b60523d, -8px -8px 6px #dddddd87;
        font-weight:700;}
        
        input:focus { border-color:
       #475569; }
        
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 50px;
            background:   #475569;
            color: #fff;
            box-shadow: 2px 2px 5px #4b60523d, -8px -8px 6px #dddddd87;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }
        
        .dl-group { display: flex; gap: 8px; flex-direction: column; width: 100%; }
        .dl-btn { width: 100%; background: #475569; padding: 10px; text-decoration: none; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 3vw; display: flex; align-items: center; justify-content: center; gap: 5px;}
        .dl-btn.mp3 { background: #00653e }

        .notch { height: 35px; display: flex; justify-content: left; align-items: center; color: #0092c9; font-size: 14px; font-weight: 700; box-shadow: 2px 2px 5px #4b60523d, -8px -8px 6px #dddddd87; margin-bottom: 15px;}
        
        input::placeholder {
          color: #475569;
          opacity: 1; 
          
    </style>
</head>
<body>
<div class="container">
<div class="card">
    
    <div class="footer-wrapper">
        <div class="thumb-column">
            <div class="thumb-container">
                <img id="videoThumb" class="thumbnail" src="https://i.postimg.cc/nVkfr6fd/6c9c471f41d4a6b20a6d7c68ff27ee01-2.jpg" alt="Thumbnail">
            </div>
        </div>

        <div class="result-column">
            <div>
                <div id="videoTitle" class="video-title-box">Tiktok Download Vidio | MP3 </div>
                <div id="loadingSpinner" class="spinner"></div>
            </div>
            
            <div class="dl-group" id="dlGroup" style="visibility: hidden;">
                <button id="dlVideo" class="dl-btn"><i class="fa fa-video"></i> MP4 VIDEO</button>
                <button id="dlAudio" class="dl-btn mp3"><i class="fa fa-music"></i> MP3 AUDIO</button>
            </div>
        </div>
    </div>

    <input type="text" id="urlInput" placeholder="Masukan link video di sini..." style="color:#00aa00;">
    <button id="getBtn">PROSES DATA<i class="fa fa-download" style="margin-left: 8px;"></i></button>
</div>

<script>
    const btn = document.getElementById('getBtn');
    const dlGroup = document.getElementById('dlGroup');
    const spinner = document.getElementById('loadingSpinner');
    const imgThumb = document.getElementById('videoThumb');
    const videoTitle = document.getElementById('videoTitle');
    
    let videoUrl = "";
    let audioUrl = "";

    btn.onclick = async () => {
        const inputUrl = document.getElementById('urlInput').value.trim();
        if(!inputUrl) return alert("Masukkan link terlebih dahulu!");

        spinner.style.display = 'block';
        dlGroup.style.visibility = 'hidden';
        videoTitle.innerText = "Sedang memproses...";
        imgThumb.src = "https://via.placeholder.com/400x225/0f172a/334155?text=Loading...";

        try {
            const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(inputUrl)}`);
            const resData = await response.json();

            if(resData.code === 0) {
                const data = resData.data;
                imgThumb.src = data.cover;
                videoTitle.innerText = data.title || "Konten Ditemukan";
                
                videoUrl = data.play.startsWith('http') ? data.play : `https://www.tikwm.com${data.play}`;
                audioUrl = data.music.startsWith('http') ? data.music : `https://www.tikwm.com${data.music}`;
                
                spinner.style.display = 'none';
                dlGroup.style.visibility = 'visible';
            } else {
                alert("Gagal: " + resData.msg);
                videoTitle.innerText = "Gagal memuat data.";
                spinner.style.display = 'none';
            }
        } catch (e) {
            alert("Terjadi kesalahan API!");
            videoTitle.innerText = "Terjadi kesalahan.";
            spinner.style.display = 'none';
        }
    };

    async function downloadFile(url, filename, event) {
        const btnRef = event.currentTarget;
        const originalText = btnRef.innerHTML;
        btnRef.innerText = "Proses...";
        btnRef.style.opacity = "0.7";

        try {
            const resp = await fetch(url);
            const blob = await resp.blob();
            const dlUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = dlUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(dlUrl);
        } catch (err) {
            window.open(url, '_blank');
        } finally {
            btnRef.innerHTML = originalText;
            btnRef.style.opacity = "1";
        }
    }

    document.getElementById('dlVideo').onclick = (e) => downloadFile(videoUrl, `video_tommy_${Date.now()}.mp4`, e);
    document.getElementById('dlAudio').onclick = (e) => downloadFile(audioUrl, `audio_tommy_${Date.now()}.mp3`, e);
</script>

</body>
</html>
